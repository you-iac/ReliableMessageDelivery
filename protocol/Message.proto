syntax = "proto3";

package message;

// MessageType 表示一个 Envelope 的业务类型。
// 接收方解析出 Envelope 后，可以根据该类型分发到不同的业务处理逻辑。
enum MessageType {
  UNKNOWN = 0;
  LOGIN_REQ = 1;
  LOGIN_RESP = 2;
  CHAT_REQ = 3;
  CHAT_PUSH = 4;
  ACK = 5;
  HEARTBEAT = 6;
}

// Envelope 是应用层统一消息外壳。
//
// TCP 只提供字节流，不保留 send() 的消息边界，所以实际在网络上传输时建议使用：
//   4 字节大端长度 + 序列化后的 Envelope 字节
//
// 接收方先按长度头拆出完整 Envelope，再反序列化，最后根据 type/payload
// 决定交给哪个业务处理函数。
message Envelope {
  
  MessageType type = 1;   // 业务包类型，例如登录、聊天、确认、心跳。

  uint64      seq = 2;   // 客户端在单个连接内维护的请求序号。Ack回同一个 seq

  uint64      timestamp_ms = 3;  // 发送方生成的毫秒级时间戳。可用于链路追踪和粗略的延迟统计。

  
  oneof   payload {       //具体的内容体// 每个 Envelope 只应该携带一种具体 payload。
    LoginRequest  login_req = 10;
    LoginResponse login_resp = 11;
    ChatRequest   chat_req = 12;
    ChatPush      chat_push = 13;
    Ack           ack = 14;
    Heartbeat     heartbeat = 15;
  }
}

// LoginRequest 用于把 uid 绑定到当前 TCP 连接。
// 这是服务端维护在线用户表的第一步。
message LoginRequest {
  uint64 uid = 1;
}

// LoginResponse 告诉客户端 uid 和连接是否绑定成功。
message LoginResponse {
  // true 表示登录/绑定成功。
  bool ok = 1;

  // 失败原因或调试信息。成功时通常为空。
  string reason = 2;
}

// ChatRequest 是发送方发给服务端的聊天消息请求。
// 服务端收到后应校验请求、分配服务端 msg_id，然后根据接收方是否在线
// 决定实时推送或后续存为离线消息。
message ChatRequest {
  // 发送方 uid。
  uint64 from_uid = 1;

  // 接收方 uid。
  uint64 to_uid = 2;

  // 第一版先只支持文本内容。
  string content = 3;

  // 客户端生成的消息 ID。
  // 后续可用于幂等去重：
  //   from_uid + client_msg_id -> 服务端 msg_id
  // 这样客户端重试发送时，服务端不会重复创建消息。
  string client_msg_id = 4;
}

// ChatPush 是服务端推送给接收方客户端的消息。
// 其中包含服务端分配的 msg_id，该 ID 后续用于 ACK、重试、去重和追踪。
message ChatPush {
  // 服务端生成的持久化消息 ID。
  uint64 msg_id = 1;

  // 原始发送方 uid。
  uint64 from_uid = 2;

  // 接收方 uid。
  uint64 to_uid = 3;

  // 从 ChatRequest 复制过来的文本内容。
  string content = 4;

  // 服务端创建或推送消息时的毫秒级时间戳。
  uint64 server_timestamp_ms = 5;

  // true 表示这是登录后的历史消息回放，客户端只展示，不作为可靠投递 ACK。
  bool history = 6;
}

// Ack 是通用确认包。
// 第一版可以用来确认服务端已经收到并处理 ChatRequest。
// 后续也可以扩展为接收方对 ChatPush 的消费确认。
message Ack {
  // 服务端持久化消息 ID。
  // 如果请求在服务端分配 msg_id 前就失败，该字段可以为 0。
  uint64 msg_id = 1;

  // 被确认的原始请求 seq。
  uint64 seq = 2;

  // true 表示对应操作成功。
  bool ok = 3;

  // 失败原因或调试信息。成功时通常为空。
  string reason = 4;
}

// Heartbeat 用于连接保活，也可以帮助服务端发现失效连接。
message Heartbeat {
  // 当前连接所属用户的 uid。
  uint64 uid = 1;
}
