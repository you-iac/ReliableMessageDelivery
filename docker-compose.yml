services:
  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
    image: reliable-message-delivery:local
    depends_on:
      redis:
        condition: service_healthy
    environment:
      RMD_REDIS_HOST: redis
      RMD_REDIS_PORT: "6379"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  redis-data:
